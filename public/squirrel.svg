<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240" role="img" aria-label="Squirrel holding an envelope">
  <!-- big fluffy tail -->
  <path d="M52 196
           C 14 186, 4 138, 26 104
           C 44 76, 84 68, 100 92
           C 82 92, 66 106, 66 128
           C 66 118, 46 122, 42 142
           C 38 162, 52 178, 74 180
           Z"
        fill="#a05a1c"/>
  <path d="M60 182
           C 34 172, 30 140, 46 118
           C 56 104, 76 100, 86 112
           C 72 114, 62 126, 63 142
           C 58 138, 50 146, 52 158
           C 54 170, 62 176, 74 178
           Z"
        fill="#c27a35"/>

  <!-- body -->
  <ellipse cx="128" cy="163" rx="58" ry="55" fill="#b5651d"/>
  <!-- belly -->
  <ellipse cx="128" cy="175" rx="38" ry="36" fill="#f7e6cd"/>

  <!-- feet -->
  <ellipse cx="97" cy="215" rx="20" ry="11" fill="#8f4a12"/>
  <ellipse cx="159" cy="215" rx="20" ry="11" fill="#8f4a12"/>

  <!-- head -->
  <circle cx="128" cy="86" r="44" fill="#b5651d"/>
  <!-- ears -->
  <path d="M92 58 C 86 34, 104 28, 112 46 C 106 48, 98 52, 92 58 Z" fill="#b5651d"/>
  <path d="M164 58 C 170 34, 152 28, 144 46 C 150 48, 158 52, 164 58 Z" fill="#b5651d"/>
  <path d="M96 54 C 93 42, 102 38, 107 47 C 103 49, 99 51, 96 54 Z" fill="#e8a56b"/>
  <path d="M160 54 C 163 42, 154 38, 149 47 C 153 49, 157 51, 160 54 Z" fill="#e8a56b"/>

  <!-- muzzle -->
  <ellipse cx="128" cy="102" rx="24" ry="18" fill="#f7e6cd"/>
  <!-- cheeks -->
  <circle cx="103" cy="98" r="7" fill="#e8a56b" opacity="0.55"/>
  <circle cx="153" cy="98" r="7" fill="#e8a56b" opacity="0.55"/>

  <!-- eyes -->
  <circle cx="112" cy="82" r="7.5" fill="#3b2313"/>
  <circle cx="144" cy="82" r="7.5" fill="#3b2313"/>
  <circle cx="114.5" cy="79.5" r="2.5" fill="#fff"/>
  <circle cx="146.5" cy="79.5" r="2.5" fill="#fff"/>

  <!-- nose + mouth -->
  <ellipse cx="128" cy="96" rx="5.5" ry="4.5" fill="#3b2313"/>
  <path d="M128 100 C 128 106, 122 108, 118 106 M128 100 C 128 106, 134 108, 138 106"
        fill="none" stroke="#3b2313" stroke-width="2.4" stroke-linecap="round"/>
  <!-- buck teeth -->
  <rect x="123" y="108" width="5" height="7" rx="1.5" fill="#fff"/>
  <rect x="128.5" y="108" width="5" height="7" rx="1.5" fill="#fff"/>

  <!-- envelope -->
  <g transform="rotate(-8 165 160)">
    <rect x="127" y="138" width="78" height="52" rx="6" fill="#fffdf6" stroke="#d9c9a8" stroke-width="2.5"/>
    <path d="M129 143 L 166 170 L 203 143" fill="none" stroke="#d9c9a8" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="196" cy="181" r="7" fill="#7a9e4f"/>
  </g>

  <!-- arms over the envelope -->
  <path d="M96 132 C 106 144, 118 152, 132 154 C 124 162, 106 158, 96 146 Z" fill="#b5651d"/>
  <ellipse cx="130" cy="153" rx="9" ry="7" fill="#8f4a12" transform="rotate(-14 130 153)"/>
  <path d="M177 160 C 182 150, 178 139, 168 139 C 162 145, 165 155, 173 161 Z" fill="#b5651d"/>
  <ellipse cx="163" cy="144" rx="9" ry="7" fill="#8f4a12" transform="rotate(16 163 144)"/>
</svg>
