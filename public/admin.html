<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>send — admin</title>
    <link rel="stylesheet" href="/app.css" />
    <link rel="icon" href="/squirrel.svg" type="image/svg+xml" />
  </head>
  <body>
    <main class="wrap">
      <header class="topbar">
        <img class="logo" src="/squirrel.svg" alt="" />
        <div>
          <h1>send · admin</h1>
          <div class="sub">Hello Robert 🐿️</div>
        </div>
        <div class="spacer"></div>
        <button class="secondary" id="logout">Log out</button>
      </header>

      <section class="card">
        <h2>New token</h2>
        <form id="create-form">
          <div class="form-grid">
            <div style="grid-column: span 2">
              <label for="new-token">Token</label>
              <div class="token-input-row">
                <input
                  type="text"
                  id="new-token"
                  placeholder="leave empty to autogenerate"
                  autocomplete="off"
                  autocapitalize="none"
                  spellcheck="false"
                />
                <button type="button" class="secondary" id="generate">🎲 Generate</button>
              </div>
            </div>
            <div>
              <label for="new-name">Recipient name</label>
              <input type="text" id="new-name" required maxlength="100" />
            </div>
            <div>
              <label for="new-ttl">TTL (days)</label>
              <input type="number" id="new-ttl" value="7" min="1" max="3650" />
            </div>
            <div>
              <label for="new-limit">Limit (MB)</label>
              <input type="number" id="new-limit" value="100" min="1" max="1024" />
            </div>
            <div>
              <button type="submit">Create token</button>
            </div>
          </div>
          <p class="msg" id="create-msg"></p>
        </form>
      </section>

      <section class="card">
        <h2>Tokens</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Token</th>
              <th>Expires</th>
              <th class="num">Used / limit</th>
              <th class="num">Files</th>
            </tr>
          </thead>
          <tbody id="token-rows"></tbody>
        </table>
        <div class="empty" id="tokens-empty" hidden>No tokens yet — create one above.</div>
      </section>
    </main>
    <script type="module" src="/js/admin.js"></script>
  </body>
</html>
