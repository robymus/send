name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: send
          POSTGRES_PASSWORD: send
          POSTGRES_DB: send
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U send"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://send:send@localhost:5433/send
      SESSION_SECRET: ci-only-secret-ci-only-secret-ci-only-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
